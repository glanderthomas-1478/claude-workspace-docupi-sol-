<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DocuControl{% endblock %} — DocuControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/docucontrol.css" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <div class="brand">
        <span class="logo">DocuControl<span class="by">by GeTmatic</span></span>
    </div>
    <span class="conn-badge {% if tcp_connected %}online{% else %}offline{% endif %}" id="connBadge">
        <span class="dot"></span>
        <span id="connText">{% if tcp_connected %}Verbunden{% else %}Getrennt{% endif %}</span>
    </span>
</div>

<!-- Navstrip -->
<nav class="navstrip">
    <a href="/" class="tab {% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/files" class="tab {% if request.path.startswith('/files') %}active{% endif %}">
        <i class="bi bi-folder2-open"></i> Dateien
    </a>
    <a href="/settings" class="tab {% if request.path.startswith('/settings') %}active{% endif %}">
        <i class="bi bi-gear"></i> Einstellungen
    </a>
</nav>

<main class="page">
    {% block content %}{% endblock %}
</main>

<footer>DocuControl 2026 &copy; GeTmatic &mdash; Krefeld</footer>

<script>
/* Badge: TCP-Status alle 10 Sekunden aktualisieren */
(function() {
    function refreshBadge() {
        fetch('/api/tcp_capture/status')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                var badge = document.getElementById('connBadge');
                var text = document.getElementById('connText');
                var connected = d.enabled;
                badge.className = 'conn-badge ' + (connected ? 'online' : 'offline');
                text.textContent = connected ? 'Verbunden' : 'Getrennt';
            })
            .catch(function() {});
    }
    setInterval(refreshBadge, 10000);
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
