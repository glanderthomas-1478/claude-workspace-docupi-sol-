  <rect x="0"   y="0" width="10" height="62" fill="#b0bec5"/>
  <rect x="198" y="0" width="10" height="62" fill="#b0bec5"/>
  <rect x="396" y="0" width="10" height="62" fill="#b0bec5"/>
  <rect x="594" y="0" width="10" height="62" fill="#b0bec5"/>
  <rect x="790" y="0" width="10" height="62" fill="#b0bec5"/>
