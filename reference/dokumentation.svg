  <text x="326" y="244" font-size="6" fill="#546e7a" font-family="monospace">10</text>
  <text x="368" y="244" font-size="6" fill="#546e7a" font-family="monospace">15</text>
  <text x="410" y="244" font-size="6" fill="#546e7a" font-family="monospace">20</text>
  <text x="448" y="244" font-size="6" fill="#546e7a" font-family="monospace">25 min</text>
