  <circle cx="172" cy="158" r="4" fill="#00e676" filter="url(#glowGreen)"/>
  <circle cx="172" cy="174" r="4" fill="#00e676" filter="url(#glowGreen)"/>
  <circle cx="172" cy="190" r="4" fill="#ffd54f" filter="url(#glow)"/>
