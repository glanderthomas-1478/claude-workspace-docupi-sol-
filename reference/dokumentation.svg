<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Sterilisationsdokumentation Autoklav Prozessprotokoll EN ISO 17665">
  <defs>
    <linearGradient id="hallBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="60%" style="stop-color:#e8eef4"/>
      <stop offset="100%" style="stop-color:#dce5ee"/>
    </linearGradient>
    <linearGradient id="floorG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cfd8e0"/>
      <stop offset="100%" style="stop-color:#b8c4ce"/>
    </linearGradient>
    <linearGradient id="ceilingG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dce6ef"/>
      <stop offset="100%" style="stop-color:#c8d6e2"/>
    </linearGradient>
    <linearGradient id="autoKlavBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e8ee"/>
      <stop offset="50%" style="stop-color:#cdd8e2"/>
      <stop offset="100%" style="stop-color:#b8c8d4"/>
    </linearGradient>
    <linearGradient id="autoKlavDoor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90a4ae"/>
      <stop offset="100%" style="stop-color:#607d8b"/>
    </linearGradient>
    <linearGradient id="panelG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#37474f"/>
      <stop offset="100%" style="stop-color:#263238"/>
    </linearGradient>
    <linearGradient id="screenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#0f1e2a"/>
    </linearGradient>
    <linearGradient id="tealAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#26a69a"/>
      <stop offset="100%" style="stop-color:#00796b"/>
    </linearGradient>
    <linearGradient id="paperG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f7fa"/>
    </linearGradient>
    <linearGradient id="printerG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#455a64"/>
      <stop offset="100%" style="stop-color:#263238"/>
    </linearGradient>
    <filter id="softShadow">
