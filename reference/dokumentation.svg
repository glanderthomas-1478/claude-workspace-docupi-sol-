  <text x="580" y="140" font-size="6.5" fill="#1a3a5c">03.06.2026 · 08:14</text>
  <text x="510" y="152" font-size="6.5" fill="#455a64" font-weight="bold">Gerät:</text>
  <text x="580" y="152" font-size="6.5" fill="#1a3a5c">AK-03 · S/N 20240118</text>
  <text x="510" y="164" font-size="6.5" fill="#455a64" font-weight="bold">Zyklus:</text>
  <text x="580" y="164" font-size="6.5" fill="#1a3a5c">134°C / 18 min</text>
  <text x="510" y="176" font-size="6.5" fill="#455a64" font-weight="bold">T-max:</text>
  <text x="580" y="176" font-size="6.5" fill="#e65100" font-weight="bold">134.2 °C ✓</text>
  <text x="510" y="188" font-size="6.5" fill="#455a64" font-weight="bold">p-max:</text>
  <text x="580" y="188" font-size="6.5" fill="#1565c0" font-weight="bold">3.04 bar ✓</text>
  <text x="510" y="200" font-size="6.5" fill="#455a64" font-weight="bold">Ergebnis:</text>
  <text x="580" y="200" font-size="6.5" fill="#00796b" font-weight="bold">STERIL ✓</text>
